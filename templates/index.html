<!doctype html>
<html lang="en">
  <head>
    {% include '_adsense_head.html' %}
    {% include '_brand_head.html' %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a9aaa5">
    <title>Focus Timer — Browser Tools</title>
    <meta name="description" content="A minimal focus timer built for doing one thing at a time.">
    <link rel="canonical" href="{{ canonical_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <main class="page-shell">
      {% include '_tool_launcher.html' %}
      <section class="timer-card" aria-label="Focus timer">
        <div class="card-topline">
          <button class="sound-button" id="soundToggle" type="button" aria-pressed="true" aria-label="Completion sound on">
            <span class="sound-icon" aria-hidden="true">♪</span>
            <span id="soundLabel">Sound on</span>
          </button>
        </div>

        <div class="preset-row" aria-label="Quick timer presets">
          <button class="preset" type="button" data-minutes="5">5 MIN</button>
          <button class="preset" type="button" data-minutes="15">15 MIN</button>
          <button class="preset active" type="button" data-minutes="25">25 MIN</button>
          <button class="preset" type="button" data-minutes="45">45 MIN</button>
          <button class="preset custom-trigger" id="customTrigger" type="button">CUSTOM TIME</button>
        </div>

        <form class="custom-time" id="customForm" hidden>
          <label for="customMinutes">Focus duration</label>
          <div class="custom-field">
            <input id="customMinutes" name="minutes" type="number" min="1" max="180" value="30" inputmode="numeric">
            <span>MIN</span>
            <button type="submit">APPLY</button>
          </div>
        </form>

        <div class="clock-wrap">
          <div class="progress-ring" id="progressRing" style="--progress: 0deg">
            <div class="clock" id="clock" role="timer" aria-live="off" aria-label="25 minutes remaining">
              <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
            </div>
          </div>
        </div>

        <div class="controls">
          <button class="secondary-button" id="resetButton" type="button">RESET</button>
          <button class="primary-button" id="startButton" type="button">
            <span class="play-icon" aria-hidden="true">▶</span>
            <span id="startLabel">START FOCUS</span>
          </button>
        </div>

        <p class="hint"><kbd>Space</kbd> Start / Pause <span aria-hidden="true">·</span> <kbd>R</kbd> Reset</p>
      </section>

      {% include '_site_footer.html' %}
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">Session complete. Take a moment to reset.</div>
    <script src="{{ url_for('static', filename='js/tool-launcher.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/timer.js') }}" defer></script>
  </body>
</html>
