{% if seo_page %}
<meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ seo_page.title }}">
<meta property="og:description" content="{{ seo_page.description }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ seo_page.title }}">
<meta name="twitter:description" content="{{ seo_page.description }}">
<script type="application/ld+json">{{ tool_structured_data | tojson }}</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/seo-sections.css') }}">
{% endif %}
